services:
  app:
    build:
      context: .
      args:
        SETTINGS_ENCRYPTION_KEY: ${SETTINGS_ENCRYPTION_KEY:-build-time-placeholder-32chars-min}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mysql://root:${DB_ROOT_PASSWORD:-cm_strong_db_2026}@mysql:3306/cloudmantou
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      CARD_SECRET_SALT: ${CARD_SECRET_SALT}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-true}
      SETTINGS_ENCRYPTION_KEY: ${SETTINGS_ENCRYPTION_KEY:?SETTINGS_ENCRYPTION_KEY is required}
      CRON_SECRET: ${CRON_SECRET:-}
      PAYMENT_TEST_MODE: ${PAYMENT_TEST_MODE:-false}
      NODE_ENV: production
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-cm_strong_db_2026}
      MYSQL_DATABASE: cloudmantou
    # 不暴露 3306 端口到宿主机，仅容器内网可访问
    # 如需本地调试数据库，请通过 SSH 隧道或临时开启端口
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-cm_strong_db_2026}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # 不暴露 6379 端口到宿主机，仅容器内网可访问
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  mysql_data:
  redis_data:
  uploads_data:
